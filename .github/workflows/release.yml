name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: hvn-profiler-windows-x64
            bin: hvn-profiler.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: hvn-profiler-linux-x64
            bin: hvn-profiler
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: hvn-profiler-macos-arm64
            bin: hvn-profiler

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI dev libs
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libwayland-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target }} --bin hvn-profiler

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/${{ matrix.artifact }}/
          cp README.md LICENSE dist/${{ matrix.artifact }}/
          if [ -d templates ]; then cp -r templates dist/${{ matrix.artifact }}/templates; fi

      - name: Zip artifact
        shell: bash
        run: |
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a ${{ matrix.artifact }}.zip ${{ matrix.artifact }}
          else
            zip -r ${{ matrix.artifact }}.zip ${{ matrix.artifact }}
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}.zip
          generate_release_notes: true
